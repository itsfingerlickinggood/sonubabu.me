<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Not Found — Sonu Babu</title>
  <link rel="icon" href="favicon.svg" type="image/svg+xml">
  <script>
    (function(){var t=localStorage.getItem("theme")||
    (matchMedia("(prefers-color-scheme:dark)").matches?"dark":"light");
    document.documentElement.setAttribute("data-theme",t)})();
  </script>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,300..700;1,9..40,300..700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/reset.css">
  <link rel="stylesheet" href="css/variables.css">
  <link rel="stylesheet" href="css/base.css">
  <link rel="stylesheet" href="css/components.css">
  <link rel="stylesheet" href="css/pages.css">
  <style>
    .board-page {
      min-height: 80vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      text-align: center;
      padding: var(--space-xl);
    }
    .board-container {
      width: 100%;
      max-width: 520px;
    }
    .board-header {
      font-family: 'JetBrains Mono', monospace;
      font-size: 11px;
      letter-spacing: 0.15em;
      text-transform: uppercase;
      color: var(--color-text-subtle);
      margin-bottom: var(--space-lg);
      display: flex;
      justify-content: space-between;
      padding: 0 4px;
    }
    .flip-row {
      display: flex;
      justify-content: center;
      gap: 8px;
      margin-bottom: var(--space-md);
    }
    .flip-cell {
      width: 72px;
      height: 96px;
      background: var(--color-surface);
      border: 1px solid var(--color-border);
      border-radius: 6px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: 'JetBrains Mono', monospace;
      font-size: 48px;
      font-weight: 500;
      color: var(--color-text);
      position: relative;
      overflow: hidden;
    }
    .flip-cell::after {
      content: "";
      position: absolute;
      left: 0;
      right: 0;
      top: 50%;
      height: 1px;
      background: var(--color-border);
    }
    .board-status {
      font-family: 'JetBrains Mono', monospace;
      font-size: 13px;
      letter-spacing: 0.1em;
      color: var(--color-text-muted);
      margin-bottom: var(--space-xl);
      text-transform: uppercase;
    }
    .board-dot-grid {
      width: 100%;
      height: 60px;
      margin-bottom: var(--space-xl);
    }
    .board-destinations {
      width: 100%;
      max-width: 420px;
      margin: 0 auto;
    }
    .dest-row {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 8px 0;
      border-bottom: 1px solid var(--color-border);
      font-family: 'JetBrains Mono', monospace;
      font-size: 12px;
    }
    .dest-row:last-child { border-bottom: none; }
    .dest-name { color: var(--color-text); }
    .dest-name a { color: var(--color-text); text-decoration: none; }
    .dest-name a:hover { color: var(--color-link-hover); }
    .dest-status {
      color: var(--color-text-subtle);
      font-size: 10px;
      letter-spacing: 0.1em;
      text-transform: uppercase;
    }
    .dest-status.on-time { color: var(--color-text-muted); }
    @media (max-width: 480px) {
      .flip-cell { width: 56px; height: 76px; font-size: 36px; }
      .flip-row { gap: 5px; }
    }
  </style>
</head>
<body>
  <div class="site-container">
    <nav class="site-nav" aria-label="Main navigation">
      <a href="index.html" class="nav-name">Sonu Babu</a>
      <a href="blog.html">Blog</a>
      <a href="projects.html">Projects</a>
      <a href="research.html">Research</a>
      <a href="learnings.html">Learnings</a>
      <button class="theme-toggle" type="button" aria-label="Switch theme">
        <svg class="icon-sun" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="5"/><line x1="12" y1="1" x2="12" y2="3"/><line x1="12" y1="21" x2="12" y2="23"/><line x1="4.22" y1="4.22" x2="5.64" y2="5.64"/><line x1="18.36" y1="18.36" x2="19.78" y2="19.78"/><line x1="1" y1="12" x2="3" y2="12"/><line x1="21" y1="12" x2="23" y2="12"/><line x1="4.22" y1="19.78" x2="5.64" y2="18.36"/><line x1="18.36" y1="5.64" x2="19.78" y2="4.22"/></svg>
        <svg class="icon-moon" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/></svg>
      </button>
    </nav>

    <main class="board-page">
      <div class="board-container">
        <div class="board-header">
          <span>Departures</span>
          <span id="board-clock"></span>
        </div>

        <div class="flip-row">
          <div class="flip-cell">4</div>
          <div class="flip-cell">0</div>
          <div class="flip-cell">4</div>
        </div>

        <p class="board-status">Destination not found</p>

        <div class="board-dot-grid" data-viz="gridwalk"></div>

        <div class="board-destinations">
          <div class="dest-row">
            <span class="dest-name"><a href="index.html">Home</a></span>
            <span class="dest-status on-time">On time</span>
          </div>
          <div class="dest-row">
            <span class="dest-name"><a href="blog.html">Blog</a></span>
            <span class="dest-status on-time">On time</span>
          </div>
          <div class="dest-row">
            <span class="dest-name"><a href="projects.html">Projects</a></span>
            <span class="dest-status on-time">On time</span>
          </div>
          <div class="dest-row">
            <span class="dest-name"><a href="research.html">Research</a></span>
            <span class="dest-status on-time">On time</span>
          </div>
          <div class="dest-row">
            <span class="dest-name"><a href="learnings.html">Learnings</a></span>
            <span class="dest-status on-time">On time</span>
          </div>
        </div>
      </div>
    </main>

    <footer class="site-footer">
      <p>&copy; 2026 Sonu Babu</p>
    </footer>
  </div>

  <script src="js/main.js"></script>
  <script src="js/viz.js"></script>
  <script>
    (function(){
      var el=document.getElementById("board-clock");
      function tick(){
        var d=new Date();
        el.textContent=String(d.getHours()).padStart(2,"0")+":"+
          String(d.getMinutes()).padStart(2,"0");
      }
      tick();setInterval(tick,10000);
    })();
  </script>
</body>
</html>
